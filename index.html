<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kart Drift Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div class="ui">
    <div id="lap">Lap: 0</div>
    <div id="time">Time: 0.00</div>
    <div id="boost">Boost: 0%</div>
  </div>

  <div class="controls">
    <button id="left">◀</button>
    <button id="right">▶</button>
    <button id="accel">▲</button>
    <button id="brake">▼</button>
    <button id="drift">DRIFT</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
